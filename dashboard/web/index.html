<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>open-geo — AI visibility dashboard</title>
    <script>
      // Pre-paint the theme class and the html lang before React mounts, to avoid
      // a flash of the wrong theme / wrong language attribute. Defaults: light/dark
      // from the system, language "en".
      try {
        var s = localStorage.getItem("og-theme");
        var dark = s ? s === "dark" : window.matchMedia("(prefers-color-scheme: dark)").matches;
        document.documentElement.classList.toggle("dark", dark);
        var lang = localStorage.getItem("og-lang") || "en";
        document.documentElement.setAttribute("lang", lang);
      } catch (e) {}
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/redesign/main.tsx"></script>
  </body>
</html>
