<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 600" role="img" aria-labelledby="t d" font-family="ui-sans-serif, -apple-system, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif">
  <title id="t">open-geo — GEO visibility tracker</title>
  <desc id="d">The /open-geo Claude Code command over a dark panel, beside a visibility funnel narrowing from queries to AI overview to sources to citations.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#0a0e16"/>
      <stop offset="1" stop-color="#0c111c"/>
    </linearGradient>
    <radialGradient id="glowA" cx="0.24" cy="0.28" r="0.6">
      <stop offset="0" stop-color="#34d399" stop-opacity="0.16"/>
      <stop offset="1" stop-color="#34d399" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="glowB" cx="0.86" cy="0.92" r="0.6">
      <stop offset="0" stop-color="#7c8cf8" stop-opacity="0.16"/>
      <stop offset="1" stop-color="#7c8cf8" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="accent" gradientUnits="userSpaceOnUse" x1="72" y1="0" x2="540" y2="0">
      <stop offset="0" stop-color="#34d399"/>
      <stop offset="1" stop-color="#7c8cf8"/>
    </linearGradient>
    <linearGradient id="funnel" gradientUnits="userSpaceOnUse" x1="648" y1="0" x2="1128" y2="0">
      <stop offset="0" stop-color="#34d399"/>
      <stop offset="1" stop-color="#7c8cf8"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="160%">
      <feDropShadow dx="0" dy="10" stdDeviation="18" flood-color="#000000" flood-opacity="0.45"/>
    </filter>
  </defs>

  <rect width="1200" height="600" fill="url(#bg)"/>
  <rect width="1200" height="600" fill="url(#glowA)"/>
  <rect width="1200" height="600" fill="url(#glowB)"/>
  <circle cx="1070" cy="110" r="232" fill="none" stroke="#ffffff" stroke-opacity="0.035" stroke-width="1.5"/>
  <circle cx="1070" cy="110" r="324" fill="none" stroke="#ffffff" stroke-opacity="0.03" stroke-width="1.5"/>

  <text x="72" y="160" font-size="78" font-weight="800" letter-spacing="-1">
    <tspan fill="#eef3f8">open</tspan><tspan fill="url(#accent)">-geo</tspan>
  </text>
  <rect x="74" y="182" width="132" height="7" rx="3.5" fill="url(#accent)"/>
  <text x="74" y="238" font-size="31" font-weight="600" fill="#d7e0ea">GEO Visibility Tracker</text>
  <text x="74" y="278" font-size="20" fill="#93a0b1">Measure how visible your brand is inside</text>
  <text x="74" y="306" font-size="20" fill="#93a0b1">AI answers — sources, citations, sentiment.</text>

  <text x="78" y="358" font-size="21" fill="#c4cfdb"><tspan fill="#34d399" font-weight="700">✓</tspan>  Google AI Overview capture</text>
  <text x="78" y="398" font-size="21" fill="#c4cfdb"><tspan fill="#34d399" font-weight="700">✓</tspan>  Six-metric visibility funnel</text>
  <text x="78" y="438" font-size="21" fill="#c4cfdb"><tspan fill="#34d399" font-weight="700">✓</tspan>  Dashboard + PDF — EN / RU</text>

  <rect x="72" y="492" width="452" height="56" rx="28" fill="#10182a" stroke="#2a3a57" stroke-width="1.5"/>
  <text x="98" y="527" font-size="18" fill="#34d399">▶</text>
  <text x="124" y="527" font-size="19" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace"><tspan fill="#34d399" font-weight="600">/open-geo</tspan><tspan fill="#8c99ab">  ·  a Claude Code skill</tspan></text>

  <rect x="648" y="92" width="480" height="190" rx="18" fill="#0d1422" stroke="#233149" stroke-width="1.5" filter="url(#shadow)"/>
  <circle cx="676" cy="122" r="6" fill="#ff5f57"/>
  <circle cx="698" cy="122" r="6" fill="#febc2e"/>
  <circle cx="720" cy="122" r="6" fill="#28c840"/>
  <text x="752" y="127" font-size="13" font-weight="500" letter-spacing="0.5" fill="#6b7888" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace">open-geo · run</text>
  <g font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" font-size="16.5">
    <text x="668" y="166"><tspan fill="#5f6c7e">$ </tspan><tspan fill="#34d399">/open-geo </tspan><tspan fill="#cdd7e3">questions.csv</tspan><tspan fill="#5f6c7e"> \</tspan></text>
    <text x="700" y="192"><tspan fill="#d2a8ff">google </tspan><tspan fill="#6ea8fe">acme.com</tspan><tspan fill="#5f6c7e"> \</tspan></text>
    <text x="700" y="218"><tspan fill="#8a97a9">--brand </tspan><tspan fill="#7ee787">"Acme"</tspan><tspan fill="#8a97a9"> --n-worker </tspan><tspan fill="#f0a868">3</tspan></text>
  </g>
  <text x="668" y="252" font-size="14.5" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace"><tspan fill="#34d399">●</tspan><tspan fill="#6e7b8d"> dashboard ready · 6 metrics · 3 lenses</tspan></text>

  <text x="648" y="324" font-size="13" font-weight="600" letter-spacing="2.5" fill="#6b7888">VISIBILITY FUNNEL</text>
  <g>
    <rect x="648" y="340" width="480" height="38" rx="9" fill="url(#funnel)" fill-opacity="0.95"/>
    <text x="666" y="364" font-size="16" font-weight="600" fill="#08131f">Queries</text>
    <text x="1112" y="364" font-size="16" font-weight="700" fill="#08131f" text-anchor="end">120</text>

    <rect x="648" y="391" width="384" height="38" rx="9" fill="url(#funnel)" fill-opacity="0.82"/>
    <text x="666" y="415" font-size="16" font-weight="600" fill="#08131f">AI Overview</text>
    <text x="1016" y="415" font-size="16" font-weight="700" fill="#08131f" text-anchor="end">84</text>

    <rect x="648" y="442" width="256" height="38" rx="9" fill="url(#funnel)" fill-opacity="0.7"/>
    <text x="666" y="466" font-size="16" font-weight="600" fill="#08131f">In sources</text>
    <text x="888" y="466" font-size="16" font-weight="700" fill="#08131f" text-anchor="end">37</text>

    <rect x="648" y="493" width="168" height="38" rx="9" fill="url(#funnel)" stroke="#aef0d6" stroke-width="1.5"/>
    <text x="666" y="517" font-size="16" font-weight="600" fill="#08131f">Cited</text>
    <text x="800" y="517" font-size="16" font-weight="700" fill="#08131f" text-anchor="end">21</text>
  </g>
  <text x="648" y="558" font-size="13" fill="#56627a" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace">n_cited ≤ n_in_sources ≤ n_overviews ≤ n_queries</text>
</svg>
